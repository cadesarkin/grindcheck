name: GrindCheck
options:
  bundleIdPrefix: com.grindcheck
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

targets:
  GrindCheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Onboarding
      - path: Main
      - path: Models
      - path: Services
      - path: Components
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grindcheck.app
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: $(TEAM_ID)
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
    entitlements:
      path: GrindCheck.entitlements
    capabilities:
      inAppPurchase: {}
    dependencies: []
    info:
      path: Info.plist
